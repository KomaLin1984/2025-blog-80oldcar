name: Auto Deploy on Push

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ← 只保留这个，强制用 Node 24

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          debug: true
          script: |
            set -e

            echo "=== Deployment started at $(date) ==="
            cd /var/www/80oldcar || { echo "路径不存在！"; exit 1; }

            git fetch --all
            git reset --hard origin/main
            git clean -fd

            rm -rf .next out node_modules/.cache || true

            export NODE_OPTIONS="--max-old-space-size=1536"
            pnpm install --frozen-lockfile || { echo "pnpm install 失败"; exit 1; }
            pnpm build || { echo "pnpm build 失败"; exit 1; }

            pm2 restart 80oldcar || { echo "PM2 重启失败，请检查 pm2 list"; exit 1; }
            pm2 save

            echo "=== Deployment completed successfully at $(date) ==="
