name: Auto Deploy on Push

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.5   # ← 改用最新稳定版
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          debug: true
          script: |
            set -e

            echo "=== 开始部署 $(date) ==="

            # 关键修复：加载你的环境变量（pnpm、pm2、node）
            source ~/.bashrc 2>/dev/null || true
            source ~/.profile 2>/dev/null || true
            source /root/.nvm/nvm.sh 2>/dev/null || true   # 如果你用 nvm

            echo "=== PATH: $PATH ==="
            echo "pnpm: $(which pnpm || echo '未找到')"
            echo "pm2: $(which pm2 || echo '未找到')"
            echo "node: $(which node || echo '未找到')"

            cd /var/www/80oldcar || { echo "路径不存在！"; exit 1; }

            git fetch --all
            git reset --hard origin/main
            git clean -fd

            rm -rf .next out node_modules/.cache || true

            export NODE_OPTIONS="--max-old-space-size=1536"
            pnpm install --frozen-lockfile
            pnpm build

            pm2 restart 80oldcar
            pm2 save

            echo "=== 部署成功完成 $(date) ==="
