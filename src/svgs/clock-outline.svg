<svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Clock face -->
  <circle cx="14" cy="14" r="10.5" stroke="currentColor" stroke-width="1.6"/>
  <!-- Hour hand -->
  <line x1="14" y1="14" x2="14" y2="8.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="14" y1="14" x2="18.5" y2="14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="14" cy="14" r="1.2" fill="currentColor"/>
  <!-- Nixie tube elements on top-right -->
  <rect x="18" y="5" width="1.8" height="4" rx="0.6" fill="currentColor" opacity="0.7"/>
  <rect x="20.5" y="5" width="1.8" height="4" rx="0.6" fill="currentColor" opacity="0.5"/>
  <rect x="23" y="5" width="1.8" height="4" rx="0.6" fill="currentColor" opacity="0.3"/>
</svg>
