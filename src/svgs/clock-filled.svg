<svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Clock face filled -->
  <circle cx="14" cy="14" r="10.5" fill="currentColor"/>
  <!-- Cutout clock face -->
  <circle cx="14" cy="14" r="9" fill="white"/>
  <!-- Nixie glow bars -->
  <rect x="18.2" y="6" width="1.6" height="3.5" rx="0.5" fill="currentColor"/>
  <rect x="20.6" y="6" width="1.6" height="3.5" rx="0.5" fill="currentColor" opacity="0.7"/>
  <rect x="23" y="6" width="1.6" height="3.5" rx="0.5" fill="currentColor" opacity="0.4"/>
  <!-- Hour hand -->
  <line x1="14" y1="14" x2="14" y2="9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="14" y1="14" x2="18.5" y2="14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
  <circle cx="14" cy="14" r="1.4" fill="currentColor"/>
</svg>
