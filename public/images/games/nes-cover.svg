<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- 背景 -->
  <rect width="400" height="300" fill="#1a1a2e"/>
  
  <!-- 电视边框 -->
  <rect x="40" y="30" width="320" height="220" rx="15" fill="#16213e" stroke="#e94560" stroke-width="4"/>
  
  <!-- 电视屏幕 -->
  <rect x="55" y="45" width="290" height="175" rx="8" fill="#0f0f23"/>
  
  <!-- NES 游戏画面示意 - 像素风格 -->
  <rect x="80" y="65" width="30" height="30" fill="#e94560"/>
  <rect x="120" y="65" width="30" height="30" fill="#f5f5f5"/>
  <rect x="150" y="65" width="30" height="30" fill="#4ecdc4"/>
  <rect x="180" y="65" width="30" height="30" fill="#ffe66d"/>
  <rect x="210" y="65" width="30" height="30" fill="#95e1d3"/>
  
  <rect x="80" y="105" width="30" height="30" fill="#f5f5f5"/>
  <rect x="120" y="105" width="30" height="30" fill="#4ecdc4"/>
  <rect x="150" y="105" width="30" height="30" fill="#ffe66d"/>
  <rect x="180" y="105" width="30" height="30" fill="#95e1d3"/>
  <rect x="210" y="105" width="30" height="30" fill="#e94560"/>
  
  <rect x="80" y="145" width="30" height="30" fill="#4ecdc4"/>
  <rect x="120" y="145" width="30" height="30" fill="#ffe66d"/>
  <rect x="150" y="145" width="30" height="30" fill="#95e1d3"/>
  <rect x="180" y="145" width="30" height="30" fill="#e94560"/>
  <rect x="210" y="145" width="30" height="30" fill="#f5f5f5"/>
  
  <rect x="80" y="185" width="30" height="30" fill="#ffe66d"/>
  <rect x="120" y="185" width="30" height="30" fill="#95e1d3"/>
  <rect x="150" y="185" width="30" height="30" fill="#e94560"/>
  <rect x="180" y="185" width="30" height="30" fill="#f5f5f5"/>
  <rect x="210" y="185" width="30" height="30" fill="#4ecdc4"/>
  
  <!-- 底部 NES 标识 -->
  <rect x="160" y="265" width="80" height="20" rx="4" fill="#e94560"/>
  <text x="200" y="280" text-anchor="middle" fill="white" font-family="Arial Black" font-size="12" font-weight="bold">NES</text>
  
  <!-- 装饰 - 复古手柄图标 -->
  <rect x="55" y="255" width="60" height="35" rx="8" fill="#4ecdc4"/>
  <circle cx="75" cy="272" r="6" fill="#1a1a2e"/>
  <rect x="88" y="267" width="18" height="10" rx="2" fill="#1a1a2e"/>
  
  <rect x="285" y="255" width="60" height="35" rx="8" fill="#e94560"/>
  <circle cx="305" cy="272" r="6" fill="#1a1a2e"/>
  <rect x="318" y="267" width="18" height="10" rx="2" fill="#1a1a2e"/>
</svg>