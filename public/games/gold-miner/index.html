<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄金矿工</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        #gameContainer {
            position: relative;
        }
        canvas {
            display: block;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            color: #ffd700;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffd700;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.9);
            text-align: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #message.show {
            opacity: 1;
        }
        #instructions {
            position: absolute;
            bottom: 10px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="game"></canvas>
        <div id="ui">
            <span id="money">💰 $0 / $500</span>
            <span id="time">⏱️ 60s</span>
        </div>
        <div id="message"></div>
        <div id="instructions">按空格键或点击屏幕发射/收回吊钩</div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const moneyDisplay = document.getElementById('money');
        const timeDisplay = document.getElementById('time');
        const messageEl = document.getElementById('message');

        // 游戏尺寸
        const W = 480;
        const H = 400;
        canvas.width = W;
        canvas.height = H;

        // 游戏状态
        let money = 0;
        let timeLeft = 60;
        let gameOver = false;
        let gameWon = false;

        // 目标金额
        const targetMoney = 500;

        // 矿工位置
        const minerX = W / 2;
        const minerY = 30;

        // 吊钩状态
        let hook = {
            angle: -Math.PI / 2, // 初始向上
            length: 30,
            maxLength: 320,
            speed: 3,
            state: 'rotating', // rotating, extending, retracting
            direction: 1, // 1 = right, -1 = left
            rotationSpeed: 0.02
        };

        // 抓取的东西
        let grabbedItem = null;

        // 金矿和石头
        let items = [];

        // 物品类型
        const itemTypes = [
            { name: '金块', value: 100, radius: 25, color: '#FFD700', gradient: '#FFA500' },
            { name: '金块', value: 150, radius: 30, color: '#FFD700', gradient: '#FF8C00' },
            { name: '金矿', value: 200, radius: 35, color: '#FFD700', gradient: '#FF6347' },
            { name: '石头', value: -20, radius: 20, color: '#808080', gradient: '#A9A9A9' },
            { name: '石头', value: -30, radius: 28, color: '#696969', gradient: '#778899' },
            { name: '金条', value: 500, radius: 40, color: '#FFD700', gradient: '#DAA520' },
            { name: '小金', value: 50, radius: 15, color: '#FFD700', gradient: '#F0E68C' },
        ];

        // 初始化物品
        function initItems() {
            items = [];
            for (let i = 0; i < 10; i++) {
                spawnItem();
            }
        }

        function spawnItem() {
            const type = itemTypes[Math.floor(Math.random() * itemTypes.length)];
            const margin = 60;
            let x, y, overlap;
            let attempts = 0;

            do {
                x = margin + Math.random() * (W - margin * 2);
                y = 80 + Math.random() * (H - 120);
                overlap = items.some(item => {
                    const dx = item.x - x;
                    const dy = item.y - y;
                    return Math.sqrt(dx * dx + dy * dy) < item.radius + type.radius + 10;
                });
                attempts++;
            } while (overlap && attempts < 50);

            items.push({
                x,
                y,
                ...type
            });
        }

        // 绘制矿工
        function drawMiner() {
            ctx.fillStyle = '#8B4513';
            ctx.beginPath();
            ctx.arc(minerX, minerY, 20, 0, Math.PI * 2);
            ctx.fill();

            // 帽子
            ctx.fillStyle = '#654321';
            ctx.fillRect(minerX - 15, minerY - 25, 30, 10);

            // 眼睛
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(minerX - 6, minerY - 3, 3, 0, Math.PI * 2);
            ctx.arc(minerX + 6, minerY - 3, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        // 绘制吊钩和绳子
        function drawHook() {
            const endX = minerX + Math.cos(hook.angle) * hook.length;
            const endY = minerY + Math.sin(hook.angle) * hook.length;

            // 绳子
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(minerX, minerY);
            ctx.lineTo(endX, endY);
            ctx.stroke();

            // 吊钩
            if (hook.state !== 'retracting' || !grabbedItem) {
                ctx.save();
                ctx.translate(endX, endY);
                ctx.rotate(hook.angle + Math.PI / 2);

                ctx.fillStyle = '#C0C0C0';
                ctx.beginPath();
                ctx.moveTo(-8, 0);
                ctx.lineTo(0, 15);
                ctx.lineTo(8, 0);
                ctx.closePath();
                ctx.fill();

                ctx.restore();
            }
        }

        // 绘制物品
        function drawItems() {
            items.forEach(item => {
                ctx.save();
                ctx.beginPath();
                ctx.arc(item.x, item.y, item.radius, 0, Math.PI * 2);

                // 渐变效果
                const gradient = ctx.createRadialGradient(
                    item.x - item.radius * 0.3, item.y - item.radius * 0.3, 0,
                    item.x, item.y, item.radius
                );
                gradient.addColorStop(0, item.gradient);
                gradient.addColorStop(1, item.color);
                ctx.fillStyle = gradient;
                ctx.fill();

                // 边框
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // 高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.beginPath();
                ctx.arc(item.x - item.radius * 0.3, item.y - item.radius * 0.3, item.radius * 0.2, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            });
        }

        // 绘制抓取的物品
        function drawGrabbedItem() {
            if (!grabbedItem) return;

            const endX = minerX + Math.cos(hook.angle) * hook.length;
            const endY = minerY + Math.sin(hook.angle) * hook.length;

            ctx.save();
            ctx.beginPath();
            ctx.arc(endX, endY, grabbedItem.radius, 0, Math.PI * 2);

            const gradient = ctx.createRadialGradient(
                endX - grabbedItem.radius * 0.3, endY - grabbedItem.radius * 0.3, 0,
                endX, endY, grabbedItem.radius
            );
            gradient.addColorStop(0, grabbedItem.gradient);
            gradient.addColorStop(1, grabbedItem.color);
            ctx.fillStyle = gradient;
            ctx.fill();

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.restore();

            // 绳子到物品
            const tipX = endX + Math.cos(hook.angle + Math.PI / 2) * 15;
            const tipY = endY + Math.sin(hook.angle + Math.PI / 2) * 15;
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(endX, endY);
            ctx.lineTo(tipX, tipY);
            ctx.stroke();
        }

        // 绘制背景
        function drawBackground() {
            // 天空渐变
            const skyGradient = ctx.createLinearGradient(0, 0, 0, H);
            skyGradient.addColorStop(0, '#87CEEB');
            skyGradient.addColorStop(1, '#E0F6FF');
            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, W, H);

            // 地面
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, H - 40, W, 40);

            // 草丛
            ctx.fillStyle = '#228B22';
            for (let i = 0; i < W; i += 15) {
                ctx.beginPath();
                ctx.moveTo(i, H - 40);
                ctx.lineTo(i + 7, H - 50 - Math.random() * 10);
                ctx.lineTo(i + 14, H - 40);
                ctx.fill();
            }
        }

        // 检测碰撞
        function checkCollision() {
            const endX = minerX + Math.cos(hook.angle) * hook.length;
            const endY = minerY + Math.sin(hook.angle) * hook.length;

            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                const dx = item.x - endX;
                const dy = item.y - endY;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < item.radius + 10) {
                    grabbedItem = item;
                    items.splice(i, 1);
                    hook.state = 'retracting';
                    return true;
                }
            }
            return false;
        }

        // 更新游戏
        function update() {
            if (gameOver) return;

            if (hook.state === 'rotating') {
                hook.angle += hook.rotationSpeed * hook.direction;
                if (hook.angle > 0.3) hook.direction = -1;
                if (hook.angle < -Math.PI + 0.3) hook.direction = 1;
            } else if (hook.state === 'extending') {
                hook.length += hook.speed;
                if (hook.length >= hook.maxLength) {
                    hook.state = 'retracting';
                }
                checkCollision();
            } else if (hook.state === 'retracting') {
                hook.length -= hook.speed * 0.8;

                // 计算抓取物品后的移动
                if (grabbedItem) {
                    const dx = minerX - grabbedItem.x;
                    const dy = minerY - grabbedItem.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > 5) {
                        grabbedItem.x += dx * 0.1;
                        grabbedItem.y += dy * 0.1;
                    }
                }

                if (hook.length <= 30) {
                    hook.length = 30;
                    hook.state = 'rotating';

                    if (grabbedItem) {
                        money += grabbedItem.value;
                        if (money < 0) money = 0;
                        grabbedItem = null;
                        updateUI();
                    }
                }

                // 检测边界反弹
                if (hook.length > 30) {
                    const endX = minerX + Math.cos(hook.angle) * hook.length;
                    if (endX < 0 || endX > W) {
                        hook.state = 'retracting';
                    }
                    const endY = minerY + Math.sin(hook.angle) * hook.length;
                    if (endY > H - 40) {
                        hook.state = 'retracting';
                    }
                }
            }
        }

        // 更新UI
        function updateUI() {
            moneyDisplay.textContent = `💰 $${money} / $${targetMoney}`;
            timeDisplay.textContent = `⏱️ ${timeLeft}s`;

            if (money >= targetMoney && !gameWon) {
                gameWon = true;
                gameOver = true;
                showMessage('🎉 恭喜通关！');
            }
        }

        // 显示消息
        function showMessage(text) {
            messageEl.textContent = text;
            messageEl.classList.add('show');
        }

        // 绘制
        function draw() {
            drawBackground();
            drawItems();
            drawMiner();
            drawHook();
            drawGrabbedItem();
        }

        // 游戏主循环
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // 发射吊钩
        function launch() {
            if (hook.state === 'rotating' && !gameOver) {
                hook.state = 'extending';
            }
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                launch();
            }
        });

        // 点击控制
        canvas.addEventListener('click', launch);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            launch();
        });

        // 计时器
        let timer = setInterval(() => {
            if (!gameOver) {
                timeLeft--;
                updateUI();
                if (timeLeft <= 0) {
                    gameOver = true;
                    if (money >= targetMoney) {
                        showMessage('🎉 恭喜通关！');
                    } else {
                        showMessage(`💔 时间到！\n获得 $${money} / $${targetMoney}`);
                    }
                }
            }
        }, 1000);

        // 重新开始
        function restart() {
            money = 0;
            timeLeft = 60;
            gameOver = false;
            gameWon = false;
            grabbedItem = null;
            hook = {
                angle: -Math.PI / 2,
                length: 30,
                maxLength: 320,
                speed: 3,
                state: 'rotating',
                direction: 1,
                rotationSpeed: 0.02
            };
            initItems();
            updateUI();
            messageEl.classList.remove('show');
        }

        // 双击重启
        canvas.addEventListener('dblclick', restart);

        // 初始化
        initItems();
        updateUI();
        gameLoop();
    </script>
</body>
</html>
